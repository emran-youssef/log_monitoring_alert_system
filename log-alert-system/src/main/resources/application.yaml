spring:
  application:
    name: log-alert-system

  datasource:
    url: jdbc:mysql://localhost:3306/log_alert_system?createDatabaseIfNotExist=true
    username: "root"
    password: "0000"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true


  kafka:
    bootstrap-servers: localhost:9092   # where Kafka broker lives (same broker Wallet app uses)
    consumer:
      group-id: log-alert-system        # this app's consumer group name; Kafka tracks read progress per group
      auto-offset-reset: earliest       # if no saved progress yet, start reading from the beginning of the topic
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer    # log lines have no key, but Kafka still needs a deserializer type
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer  # log line itself is plain text, so read it as a String

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer


classification:
  window-minutes: 5
  patterns:
    WALLET_NOT_FOUND: { keyword: "wallet not found", threshold: 3 }
    USER_NOT_FOUND: { keyword: "user not found", threshold: 3 }
    TRANSACTION_NOT_FOUND: { keyword: "transaction not found", threshold: 3 }
    HISTORY_NOT_FOUND: { keyword: "history not found ", threshold: 3 }
    EMAIL_ALREADY_EXISTS: { keyword: "email already exist", threshold: 5 }
    INSUFFICIENT_BALANCE: { keyword: "insufficient balance", threshold: 5 }
    VALIDATION_FAILURE: { keyword: "method argument not valid", threshold: 10 }
    SAME_WALLET_TRANSFER: { keyword: "same wallet transfer", threshold: 5 }
    INTERNAL_ERROR: { keyword: "exception", threshold: 2 }

logging:
  level:
    com.log_monitoring.log_alert_system.kafka.LogKafkaConsumer: DEBUG
    org.apache.kafka.clients.consumer.ConsumerConfig: WARN

server:
  port: 8081

log:
  file:
    path: logs/app.log
  monitoring:
    fixed-delay: 5000
