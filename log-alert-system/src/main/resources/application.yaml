spring:
  application:
    name: log-alert-system

  datasource:
    url: jdbc:mysql://localhost:3306/log_alert_system?createDatabaseIfNotExist=true
    username: "root"
    password: "0000"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

log:
  file:
    path: logs/app.log
  monitoring:
    fixed-delay: 5000

classification:
  window-minutes: 5
  patterns:
    # --- Active categories ---
    WALLET_NOT_FOUND: "walletnotfoundexception"
    USER_NOT_FOUND: "usernotfoundexception"
    TRANSACTION_NOT_FOUND: "transactionnotfoundexception"
    EMAIL_ALREADY_EXISTS: "emailalreadyexistexception"
    SAME_WALLET_TRANSFER: "samewallettransferexception"
    VALIDATION_FAILURE: "methodargumentnotvalidexception"
    INTERNAL_ERROR: "exception"