spring:
  application:
    name: log-alert-system

  datasource:
    url: jdbc:mysql://localhost:3306/log_alert_system?createDatabaseIfNotExist=true
    username: "root"
    password: "0000"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true