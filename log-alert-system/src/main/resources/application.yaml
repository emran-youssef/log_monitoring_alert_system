spring:
  application:
    name: log-alert-system

  datasource:
    url: jdbc:mysql://localhost:3306/log_alert_system?createDatabaseIfNotExist=true
    username: "root"
    password: "0000"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092   # where Kafka broker lives (same broker Wallet app uses)
    consumer:
      group-id: log-alert-system        # this app's consumer group name; Kafka tracks read progress per group
      auto-offset-reset: earliest       # if no saved progress yet, start reading from the beginning of the topic
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer    # log lines have no key, but Kafka still needs a deserializer type
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer  # log line itself is plain text, so read it as a String

log:
  file:
    path: logs/app.log
  monitoring:
    fixed-delay: 5000

classification:
  window-minutes: 5
  patterns:
    WALLET_NOT_FOUND:
      keyword: "walletnotfoundexception"
      threshold: 3
    USER_NOT_FOUND:
      keyword: "usernotfoundexception"
      threshold: 3
    TRANSACTION_NOT_FOUND:
      keyword: "transactionnotfoundexception"
      threshold: 3
    EMAIL_ALREADY_EXISTS:
      keyword: "emailalreadyexistexception"
      threshold: 5
    SAME_WALLET_TRANSFER:
      keyword: "samewallettransferexception"
      threshold: 5
    VALIDATION_FAILURE:
      keyword: "methodargumentnotvalidexception"
      threshold: 10
    INTERNAL_ERROR:
      keyword: "exception"
      threshold: 2

server:
  port: 8081


logging:
  level:
    com:
      log_monitoring:
        log_alert_system:
          services:
            LogKafkaConsumer: DEBUG