spring:
  application:
    name: log-alert-system

  datasource:
    url: jdbc:mysql://localhost:3306/log_alert_system?createDatabaseIfNotExist=true
    username: "root"
    password: "0000"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

log:
  file:
    path: logs/app.log
  monitoring:
    fixed-delay: 5000

classification:
  window-minutes: 5
  patterns:
    WALLET_NOT_FOUND:
      keyword: "walletnotfoundexception"
      threshold: 3
    USER_NOT_FOUND:
      keyword: "usernotfoundexception"
      threshold: 3
    TRANSACTION_NOT_FOUND:
      keyword: "transactionnotfoundexception"
      threshold: 3
    EMAIL_ALREADY_EXISTS:
      keyword: "emailalreadyexistexception"
      threshold: 5
    SAME_WALLET_TRANSFER:
      keyword: "samewallettransferexception"
      threshold: 5
    VALIDATION_FAILURE:
      keyword: "methodargumentnotvalidexception"
      threshold: 10
    INTERNAL_ERROR:
      keyword: "exception"
      threshold: 2